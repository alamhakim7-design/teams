<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Rotary Timer Pro</title>
    <style>
        :root {
            --bg-color: #050505; 
            --glass-surface: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #32d74b;
            --accent-green-glow: rgba(50, 215, 75, 0.4);
            --accent-red: #ff453a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --toast-bg: rgba(20, 20, 20, 0.85);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Utility Bar */
        .utility-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
        }

        .popout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: 0.2s;
        }
        .popout-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* Auto-Scaling Wrapper */
        #app-scaler {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            transform-origin: center center;
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
        }

        .hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
        }

        /* Glass Rotary Dial */
        .timer-container {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        .timer-container:active { cursor: grabbing; }

        .progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 12px var(--accent-green-glow));
            transition: filter 0.3s ease;
        }
        
        .ring-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 8; }
        .ring-progress {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        /* Typography */
        .time-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .time-text {
            font-size: 6.5rem;
            font-weight: 100;
            letter-spacing: -3px;
            margin: 0;
            line-height: 1;
            font-variant-numeric: tabular-nums; 
        }

        .stats-container { display: flex; gap: 12px; margin-top: 20px; }
        .stat-pill {
            background-color: var(--glass-surface);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .stat-val { color: var(--text-primary); margin-left: 6px; font-weight: 700; }

        /* Controls */
        .controls { display: flex; gap: 50px; flex-shrink: 0; }
        .btn {
            width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--glass-border);
            font-size: 1.1rem; font-weight: 500; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center;
            background-color: var(--glass-surface); color: var(--text-primary);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .btn:active { transform: scale(0.9); opacity: 0.8; }

        #start-btn { color: var(--accent-green); background-color: rgba(50, 215, 75, 0.1); border-color: rgba(50, 215, 75, 0.3); }
        #start-btn:hover { background-color: rgba(50, 215, 75, 0.2); }

        .btn.is-running { color: var(--accent-red) !important; background-color: rgba(255, 69, 58, 0.1) !important; border-color: rgba(255, 69, 58, 0.3) !important; }
        .btn.is-running:hover { background-color: rgba(255, 69, 58, 0.2) !important; }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; filter: drop-shadow(0 0 20px rgba(255, 69, 58, 0.6)); }
            100% { transform: scale(1); opacity: 1; }
        }
        .alert-active { stroke: var(--accent-red) !important; animation: pulse-ring 1.5s infinite ease-in-out; }

        /* --- GLASS TOAST NOTIFICATION --- */
        .win11-toast { 
            position: fixed; bottom: 20px; right: -350px; width: 280px; 
            background: var(--toast-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 12px 15px; 
            display: flex; align-items: center; gap: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); 
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; 
        }
        .toast-show { right: 20px; } /* Slides in */
        
        .toast-icon { 
            width: 36px; height: 36px; border-radius: 8px; 
            background: rgba(50, 215, 75, 0.2); border: 1px solid rgba(50, 215, 75, 0.5);
            display: flex; justify-content: center; align-items: center; font-size: 1.1rem; 
        }
        .toast-content { flex-grow: 1; }
        .toast-title { font-weight: bold; font-size: 0.95rem; margin: 0 0 2px 0; color: #fff; }
        .toast-msg { font-size: 0.8rem; margin: 0; color: #bbb; }
        .toast-close { background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 0 5px; }
        .toast-close:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="utility-bar" id="utility-bar">
        <button class="popout-btn" id="pip-btn">🗗 Pop Out (Always on Top)</button>
    </div>

    <div id="app-scaler">
        <div class="hint">Scroll or Drag ring to set time</div>

        <div class="timer-container" id="dial">
            <svg class="progress-ring" id="ring-svg" viewBox="0 0 360 360">
                <circle class="ring-bg" cx="180" cy="180" r="170"></circle>
                <circle class="ring-progress" id="progress-bar" cx="180" cy="180" r="170"></circle>
            </svg>

            <div class="time-display">
                <div class="time-text" id="time-text">00:00</div>
                <div class="stats-container">
                    <div class="stat-pill">Done <span class="stat-val" id="stat-comp">0</span></div>
                    <div class="stat-pill">Resets <span class="stat-val" id="stat-reset">0</span></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="reset-btn">Cancel</button>
            <button class="btn" id="start-btn">Start</button>
        </div>
    </div>

    <div class="win11-toast" id="custom-toast">
        <div class="toast-icon">⏳</div>
        <div class="toast-content">
            <p class="toast-title">Timer Complete</p>
            <p class="toast-msg">Your session is finished.</p>
        </div>
        <button class="toast-close" id="close-toast-btn">×</button>
    </div>

    <script>
        // Cache DOM elements
        const scaler = document.getElementById('app-scaler');
        const toastEl = document.getElementById('custom-toast');
        const timeText = document.getElementById('time-text');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const ring = document.getElementById('progress-bar');
        const statCompText = document.getElementById('stat-comp');
        const statResetText = document.getElementById('stat-reset');
        const utilityBar = document.getElementById('utility-bar');
        const dial = document.getElementById('dial');
        const pipBtn = document.getElementById('pip-btn');
        const closeToastBtn = document.getElementById('close-toast-btn');

        let currentWindow = window;
        let currentDocument = document;
        let flashInterval;

        // --- ALWAYS ON TOP (PICTURE-IN-PICTURE) LOGIC ---
        pipBtn.addEventListener('click', async () => {
            if (!('documentPictureInPicture' in window)) {
                alert("Your browser doesn't support the Always-on-Top feature yet.");
                return;
            }

            try {
                const pipWin = await window.documentPictureInPicture.requestWindow({
                    width: 320,
                    height: 480
                });

                // Copy styles to new window
                const style = document.querySelector('style').cloneNode(true);
                pipWin.document.head.appendChild(style);
                
                // Set solid dark background for PiP
                pipWin.document.body.style.backgroundColor = "#050505";
                pipWin.document.body.style.margin = "0";
                pipWin.document.body.style.display = "flex";
                pipWin.document.body.style.justifyContent = "center";
                pipWin.document.body.style.alignItems = "center";
                pipWin.document.body.style.height = "100vh";
                pipWin.document.body.style.overflow = "hidden";
                
                // Move the Clock AND the Toaster into the popup window
                pipWin.document.body.appendChild(scaler);
                pipWin.document.body.appendChild(toastEl);
                utilityBar.style.display = 'none'; 
                
                // Update Window References
                currentWindow.removeEventListener('resize', resizeApp);
                currentWindow = pipWin;
                currentDocument = pipWin.document;
                
                currentWindow.addEventListener('resize', resizeApp);
                currentWindow.addEventListener('mouseup', handleMouseUp);
                currentWindow.addEventListener('mousemove', handleMouseMove);
                resizeApp(); 
                
                // Handle closing the PiP Window
                pipWin.addEventListener('pagehide', () => {
                    // Move the Clock AND the Toaster back to the main tab
                    document.body.appendChild(scaler);
                    document.body.appendChild(toastEl);
                    utilityBar.style.display = 'block';
                    
                    currentWindow.removeEventListener('resize', resizeApp);
                    currentWindow.removeEventListener('mouseup', handleMouseUp);
                    currentWindow.removeEventListener('mousemove', handleMouseMove);
                    
                    currentWindow = window;
                    currentDocument = document;
                    
                    currentWindow.addEventListener('resize', resizeApp);
                    currentWindow.addEventListener('mouseup', handleMouseUp);
                    currentWindow.addEventListener('mousemove', handleMouseMove);
                    resizeApp();
                });

            } catch (err) {
                console.error("Failed to enter PiP:", err);
            }
        });

        // --- RESPONSIVE AUTO-SCALING ENGINE ---
        function resizeApp() {
            if(!scaler) return;
            const baseWidth = 450; 
            const baseHeight = 650;
            const scaleX = currentWindow.innerWidth / baseWidth;
            const scaleY = currentWindow.innerHeight / baseHeight;
            let scale = Math.min(scaleX, scaleY);
            if (scale > 1.2) scale = 1.2; 
            scaler.style.transform = `scale(${scale})`;
        }
        currentWindow.addEventListener('resize', resizeApp);
        resizeApp();

        // --- TOASTER LOGIC ---
        let toastTimeout;
        function showToast() {
            toastEl.classList.add('toast-show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(closeToast, 6000); // Auto-hide after 6 seconds
        }
        function closeToast() {
            toastEl.classList.remove('toast-show');
        }
        closeToastBtn.addEventListener('click', closeToast);

        // --- AUDIO CHIME ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const playNote = (freq, startTime) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.6, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + 0.6);
            };
            const now = audioCtx.currentTime;
            playNote(880, now); 
            playNote(1108.73, now + 0.15); 
        }

        // --- TIMER ENGINE ---
        let timeTotal = 0, timeLeft = 0, timerId = null, isRunning = false;
        let stats = { comp: 0, reset: 0 };
        
        const radius = 170;
        const circumference = 2 * Math.PI * radius;
        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = 0;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setTime(seconds) {
            if (isRunning) return;
            timeLeft = Math.max(0, Math.min(seconds, 5999)); 
            timeTotal = timeLeft;
            timeText.innerText = formatTime(timeLeft);
            
            ring.style.strokeDashoffset = 0;
            ring.classList.remove('alert-active');
            ring.style.stroke = "var(--accent-green)";
        }

        function triggerCompletion() {
            isRunning = false;
            stats.comp++;
            statCompText.innerText = stats.comp;
            
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            
            ring.classList.add('alert-active');
            ring.style.strokeDashoffset = 0;
            
            playChime();
            showToast(); // Trigger the toast in the active window!

            let flash = false;
            flashInterval = setInterval(() => {
                currentDocument.title = flash ? "🔴 TIME UP!" : "Timer Done";
                flash = !flash;
            }, 500);
            setTimeout(() => { clearInterval(flashInterval); currentDocument.title = "Timer"; }, 6000);
        }

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (timeLeft <= 0) return;

            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startBtn.innerText = 'Resume';
                startBtn.classList.remove('is-running');
            } else {
                isRunning = true;
                startBtn.innerText = 'Pause';
                startBtn.classList.add('is-running');
                ring.classList.remove('alert-active');
                ring.style.stroke = "var(--accent-green)";
                clearInterval(flashInterval);
                currentDocument.title = "Timer Running";
                closeToast(); // Hide toast if active
                
                timerId = setInterval(() => {
                    timeLeft--;
                    timeText.innerText = formatTime(timeLeft);
                    
                    const progress = timeLeft / timeTotal;
                    ring.style.strokeDashoffset = circumference - (progress * circumference);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        triggerCompletion();
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            clearInterval(flashInterval);
            currentDocument.title = "Timer";
            isRunning = false;
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            stats.reset++;
            statResetText.innerText = stats.reset;
            closeToast(); // Clear toast on reset
            setTime(0);
        });

        // --- INTERACTION ---
        dial.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!isRunning) setTime(timeLeft + (e.deltaY < 0 ? 60 : -60));
        }, { passive: false });

        let isDragging = false, lastAngle = 0;
        
        dial.addEventListener('mousedown', (e) => {
            if (isRunning) return;
            isDragging = true;
            const rect = dial.getBoundingClientRect();
            lastAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
        });

        function handleMouseUp() { isDragging = false; }
        function handleMouseMove(e) {
            if (!isDragging || isRunning) return;
            const rect = dial.getBoundingClientRect();
            const currentAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
            let delta = currentAngle - lastAngle;
            if (delta > Math.PI) delta -= Math.PI * 2;
            if (delta < -Math.PI) delta += Math.PI * 2;
            
            if (Math.abs(delta) > 0.08) {
                setTime(timeLeft + (delta > 0 ? 60 : -60));
                lastAngle = currentAngle;
            }
        }

        currentWindow.addEventListener('mouseup', handleMouseUp);
        currentWindow.addEventListener('mousemove', handleMouseMove);

        setTime(0);
    </script>
</body>
</html>
