<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Style Timer</title>
    <style>
        :root {
            /* Apple Color Palette */
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --accent-orange: #ff9f0a;
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --btn-gray: #333336;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            /* Forces Apple's San Francisco font if available, falling back to clean sans-serif */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- MAIN TIMER DIAL --- */
        .timer-container {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }
        .timer-container:active { cursor: grabbing; }

        /* SVG Ring */
        .progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            transform: rotate(-90deg);
        }
        
        .ring-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: var(--accent-orange);
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        /* Time Display */
        .time-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .time-text {
            font-size: 5.5rem;
            font-weight: 200; /* Ultra-light Apple weight */
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
            /* Ensures numbers don't jump around when changing */
            font-variant-numeric: tabular-nums; 
        }

        /* --- USAGE STATS (Pill Badges) --- */
        .stats-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-pill {
            background-color: var(--surface-color);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .stat-val {
            color: var(--text-primary);
            margin-left: 4px;
        }

        /* --- CIRCULAR BUTTONS --- */
        .controls {
            display: flex;
            gap: 40px;
            margin-top: 50px;
        }

        .btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Apple Watch style inner border */
            box-shadow: inset 0 0 0 2px var(--bg-color);
        }

        .btn:active {
            opacity: 0.6;
            transform: scale(0.95);
        }

        #reset-btn {
            background-color: var(--btn-gray);
            color: var(--text-primary);
            border: 2px solid var(--btn-gray);
        }

        #start-btn {
            background-color: rgba(48, 209, 88, 0.2);
            color: var(--accent-green);
            border: 2px solid rgba(48, 209, 88, 0.3);
        }

        .btn.is-running {
            background-color: rgba(255, 159, 10, 0.2) !important;
            color: var(--accent-orange) !important;
            border-color: rgba(255, 159, 10, 0.3) !important;
        }

        /* Alert State Animation */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .alert-active {
            stroke: var(--accent-red) !important;
            animation: pulse-ring 1.5s infinite ease-in-out;
        }

        /* Instruction Hint */
        .hint {
            position: absolute;
            top: 40px;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="hint">Scroll or Drag ring to set time</div>

    <div class="timer-container" id="dial">
        <svg class="progress-ring" viewBox="0 0 340 340">
            <circle class="ring-bg" cx="170" cy="170" r="160"></circle>
            <circle class="ring-progress" id="progress-bar" cx="170" cy="170" r="160"></circle>
        </svg>

        <div class="time-display">
            <div class="time-text" id="time-text">00:00</div>
            
            <div class="stats-container">
                <div class="stat-pill">Done<span class="stat-val" id="stat-comp">0</span></div>
                <div class="stat-pill">Resets<span class="stat-val" id="stat-reset">0</span></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="reset-btn">Cancel</button>
        <button class="btn" id="start-btn">Start</button>
    </div>

    <script>
        // --- NATIVE AUDIO CHIME ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            // Create a pleasant, soft marimba-like double chime (Apple-esque)
            const playNote = (freq, startTime) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.6, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + 0.6);
            };
            const now = audioCtx.currentTime;
            playNote(880, now);        // Note 1
            playNote(1108.73, now + 0.15); // Note 2
        }

        // --- TIMER ENGINE & UI ---
        let timeTotal = 0, timeLeft = 0, timerId = null, isRunning = false;
        let stats = { comp: 0, reset: 0 };

        const timeText = document.getElementById('time-text');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const ring = document.getElementById('progress-bar');
        
        // Calculate SVG Circle length
        const radius = 160;
        const circumference = 2 * Math.PI * radius;
        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = 0;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setTime(seconds) {
            if (isRunning) return;
            timeLeft = Math.max(0, Math.min(seconds, 5999)); // Max 99:59
            timeTotal = timeLeft;
            timeText.innerText = formatTime(timeLeft);
            
            // Reset visual states
            ring.style.strokeDashoffset = 0;
            ring.classList.remove('alert-active');
            ring.style.stroke = "var(--accent-orange)";
            document.title = "Timer";
        }

        function triggerCompletion() {
            isRunning = false;
            stats.comp++;
            document.getElementById('stat-comp').innerText = stats.comp;
            
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            
            ring.classList.add('alert-active');
            ring.style.strokeDashoffset = 0;
            
            document.title = "🔴 TIME UP!";
            playChime();

            // Native Notification
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Timer Done", { body: "Your session has completed." });
            }
        }

        // --- BUTTON ACTIONS ---
        startBtn.addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if ("Notification" in window && Notification.permission === "default") {
                await Notification.requestPermission();
            }

            if (timeLeft <= 0) return;

            if (isRunning) {
                // Pause
                clearInterval(timerId);
                isRunning = false;
                startBtn.innerText = 'Resume';
                startBtn.classList.remove('is-running');
            } else {
                // Start
                isRunning = true;
                startBtn.innerText = 'Pause';
                startBtn.classList.add('is-running');
                ring.classList.remove('alert-active');
                ring.style.stroke = "var(--accent-orange)";
                document.title = "Timer Running";
                
                timerId = setInterval(() => {
                    timeLeft--;
                    timeText.innerText = formatTime(timeLeft);
                    
                    // Smooth ring depletion
                    const progress = timeLeft / timeTotal;
                    ring.style.strokeDashoffset = circumference - (progress * circumference);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        triggerCompletion();
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            isRunning = false;
            
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            
            stats.reset++;
            document.getElementById('stat-reset').innerText = stats.reset;
            setTime(0);
        });

        // --- INTERACTION: SCROLL & DRAG ---
        const dial = document.getElementById('dial');
        
        // Scroll wheel adds/subtracts minutes
        dial.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!isRunning) setTime(timeLeft + (e.deltaY < 0 ? 60 : -60));
        }, { passive: false });

        // Click and drag in a circle to set time
        let isDragging = false, lastAngle = 0;
        dial.addEventListener('mousedown', (e) => {
            if (isRunning) return;
            isDragging = true;
            const rect = dial.getBoundingClientRect();
            lastAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging || isRunning) return;
            const rect = dial.getBoundingClientRect();
            const currentAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
            let delta = currentAngle - lastAngle;
            if (delta > Math.PI) delta -= Math.PI * 2;
            if (delta < -Math.PI) delta += Math.PI * 2;
            
            // Adjust sensitivity (0.08 radians of movement)
            if (Math.abs(delta) > 0.08) {
                setTime(timeLeft + (delta > 0 ? 60 : -60));
                lastAngle = currentAngle;
            }
        });

        // Initialize
        setTime(0);
    </script>
</body>
</html>
