<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Green Rotary Timer</title>
    <style>
        :root {
            /* Ultra-Sleek Apple Palette */
            --bg-color: #000000;
            --surface-color: rgba(255, 255, 255, 0.08);
            --accent-green: #32d74b; /* iOS Neon Green */
            --accent-green-glow: rgba(50, 215, 75, 0.4);
            --accent-red: #ff453a;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            /* Smooth fade-in on load */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- THE ROTARY DIAL --- */
        .timer-container {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }
        .timer-container:active { cursor: grabbing; }

        /* SVG Ring with Ambient Glow */
        .progress-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            transform: rotate(-90deg);
            /* Adds a subtle optical glow to the whole ring */
            filter: drop-shadow(0 0 12px var(--accent-green-glow));
            transition: filter 0.3s ease;
        }
        
        .ring-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 10; /* Slightly thinner for elegance */
        }

        .ring-progress {
            fill: none;
            stroke: var(--accent-green);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
        }

        /* Time Typography */
        .time-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .time-text {
            font-size: 6rem; /* Slightly larger, thinner font */
            font-weight: 100;
            letter-spacing: -3px;
            margin: 0;
            line-height: 1;
            font-variant-numeric: tabular-nums; 
        }

        /* --- USAGE STATS (Glass Pills) --- */
        .stats-container {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .stat-pill {
            background-color: var(--surface-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
        .stat-val {
            color: var(--text-primary);
            margin-left: 6px;
            font-weight: 700;
        }

        /* --- SLEEK BUTTONS --- */
        .controls {
            display: flex;
            gap: 50px;
            margin-top: 60px;
        }

        .btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--surface-color);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .btn:hover { background-color: rgba(255, 255, 255, 0.15); }
        .btn:active { transform: scale(0.9); opacity: 0.8; }

        #start-btn {
            color: var(--accent-green);
            background-color: rgba(50, 215, 75, 0.15);
        }
        #start-btn:hover { background-color: rgba(50, 215, 75, 0.25); }

        .btn.is-running {
            color: var(--accent-red) !important;
            background-color: rgba(255, 69, 58, 0.15) !important;
        }
        .btn.is-running:hover { background-color: rgba(255, 69, 58, 0.25) !important; }

        /* Alert State Animation */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; filter: drop-shadow(0 0 20px rgba(255, 69, 58, 0.6)); }
            100% { transform: scale(1); opacity: 1; }
        }
        .alert-active {
            stroke: var(--accent-red) !important;
            animation: pulse-ring 1.5s infinite ease-in-out;
        }
        .alert-glow { filter: drop-shadow(0 0 12px rgba(255, 69, 58, 0.4)); }

        .hint {
            position: absolute;
            top: 40px;
            color: #444;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="hint">Scroll or Drag ring to set time</div>

    <div class="timer-container" id="dial">
        <svg class="progress-ring" id="ring-svg" viewBox="0 0 360 360">
            <circle class="ring-bg" cx="180" cy="180" r="170"></circle>
            <circle class="ring-progress" id="progress-bar" cx="180" cy="180" r="170"></circle>
        </svg>

        <div class="time-display">
            <div class="time-text" id="time-text">00:00</div>
            
            <div class="stats-container">
                <div class="stat-pill">Done<span class="stat-val" id="stat-comp">0</span></div>
                <div class="stat-pill">Resets<span class="stat-val" id="stat-reset">0</span></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="reset-btn">Cancel</button>
        <button class="btn" id="start-btn">Start</button>
    </div>

    <script>
        // --- AUDIO CHIME ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const playNote = (freq, startTime) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.6, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + 0.6);
            };
            const now = audioCtx.currentTime;
            playNote(880, now); 
            playNote(1108.73, now + 0.15); 
        }

        // --- TIMER ENGINE ---
        let timeTotal = 0, timeLeft = 0, timerId = null, isRunning = false;
        let stats = { comp: 0, reset: 0 };

        const timeText = document.getElementById('time-text');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const ring = document.getElementById('progress-bar');
        const ringSvg = document.getElementById('ring-svg');
        
        const radius = 170;
        const circumference = 2 * Math.PI * radius;
        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = 0;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function setTime(seconds) {
            if (isRunning) return;
            timeLeft = Math.max(0, Math.min(seconds, 5999)); 
            timeTotal = timeLeft;
            timeText.innerText = formatTime(timeLeft);
            
            ring.style.strokeDashoffset = 0;
            ring.classList.remove('alert-active');
            ringSvg.classList.remove('alert-glow');
            ring.style.stroke = "var(--accent-green)";
            document.title = "Timer";
        }

        function triggerCompletion() {
            isRunning = false;
            stats.comp++;
            document.getElementById('stat-comp').innerText = stats.comp;
            
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            
            ring.classList.add('alert-active');
            ringSvg.classList.add('alert-glow');
            ring.style.strokeDashoffset = 0;
            
            document.title = "🔴 TIME UP!";
            playChime();

            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Timer Done", { body: "Your session has completed." });
            }
        }

        startBtn.addEventListener('click', async () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if ("Notification" in window && Notification.permission === "default") {
                await Notification.requestPermission();
            }

            if (timeLeft <= 0) return;

            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startBtn.innerText = 'Resume';
                startBtn.classList.remove('is-running');
            } else {
                isRunning = true;
                startBtn.innerText = 'Pause';
                startBtn.classList.add('is-running');
                ring.classList.remove('alert-active');
                ringSvg.classList.remove('alert-glow');
                ring.style.stroke = "var(--accent-green)";
                document.title = "Timer Running";
                
                timerId = setInterval(() => {
                    timeLeft--;
                    timeText.innerText = formatTime(timeLeft);
                    
                    const progress = timeLeft / timeTotal;
                    ring.style.strokeDashoffset = circumference - (progress * circumference);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        triggerCompletion();
                    }
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            isRunning = false;
            
            startBtn.innerText = 'Start';
            startBtn.classList.remove('is-running');
            
            stats.reset++;
            document.getElementById('stat-reset').innerText = stats.reset;
            setTime(0);
        });

        // --- INTERACTION ---
        const dial = document.getElementById('dial');
        
        dial.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!isRunning) setTime(timeLeft + (e.deltaY < 0 ? 60 : -60));
        }, { passive: false });

        let isDragging = false, lastAngle = 0;
        dial.addEventListener('mousedown', (e) => {
            if (isRunning) return;
            isDragging = true;
            const rect = dial.getBoundingClientRect();
            lastAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging || isRunning) return;
            const rect = dial.getBoundingClientRect();
            const currentAngle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
            let delta = currentAngle - lastAngle;
            if (delta > Math.PI) delta -= Math.PI * 2;
            if (delta < -Math.PI) delta += Math.PI * 2;
            
            if (Math.abs(delta) > 0.08) {
                setTime(timeLeft + (delta > 0 ? 60 : -60));
                lastAngle = currentAngle;
            }
        });

        setTime(0);
    </script>
</body>
</html>
